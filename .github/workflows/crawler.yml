name: Index the docs

on:
  workflow_dispatch:
  repository_dispatch:
    types: [site_deployed]

jobs:
  index:
    name: Crawl the docs and upload to Algolia
    runs-on: ubuntu-latest
    env:
      MINI_CRAWLER_VERSION: 0.2.0
      ALGOLIA_CLI_VERSION: 1.8.2
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Cache CLI tools
        id: cache-cli-tools
        uses: actions/cache@v5
        with:
          path: .tools
          key: ${{ runner.os }}-cli-tools-mini-crawler-${{ env.MINI_CRAWLER_VERSION }}-algolia-${{ env.ALGOLIA_CLI_VERSION }}

      - name: Add CLI tools to PATH
        run: |
          echo "${GITHUB_WORKSPACE}/.tools/mini-crawler/bin" >> "${GITHUB_PATH}"
          echo "${GITHUB_WORKSPACE}/.tools/algolia/bin" >> "${GITHUB_PATH}"

      - name: Install mini-crawler
        if: steps.cache-cli-tools.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          archive="mini-crawler_${MINI_CRAWLER_VERSION}_linux_amd64.tar.gz"
          install_dir="${GITHUB_WORKSPACE}/.tools/mini-crawler/bin"
          mkdir -p "${install_dir}"
          gh release download "v${MINI_CRAWLER_VERSION}" \
            --repo kai687/mini-crawler \
            --pattern "${archive}" \
            --pattern checksums.txt
          grep " ${archive}$" checksums.txt | sha256sum -c -
          tar -xzf "${archive}" -C "${install_dir}" mini-crawler

      - name: Install Algolia CLI
        if: steps.cache-cli-tools.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          archive="algolia_${ALGOLIA_CLI_VERSION}_linux_amd64.tar.gz"
          dirname="algolia_${ALGOLIA_CLI_VERSION}_linux_amd64"
          install_dir="${GITHUB_WORKSPACE}/.tools/algolia/bin"
          mkdir -p "${install_dir}"
          gh release download "v${ALGOLIA_CLI_VERSION}" \
            --repo algolia/cli \
            --pattern "${archive}" \
            --pattern "algolia_${ALGOLIA_CLI_VERSION}_checksums.txt"
          grep " ${archive}$" "algolia_${ALGOLIA_CLI_VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "${archive}" -C "${install_dir}" --strip-components=1 "${dirname}/algolia"

      - name: Check extraction script
        run: mini-crawler script check --script .github/crawler/sphinxawesome.star

      - name: Crawl and upload records to temporary Algolia index
        run: |
          mini-crawler crawl sitemap https://sphinxawesome.xyz/sitemap.xml \
            --script .github/crawler/sphinxawesome.star \
            --workers 2 \
            | algolia objects import "${INDEX_NAME}-tmp" \
              --application-id "${ALGOLIA_APPLICATION_ID}" \
              --api-key "${ALGOLIA_API_KEY}" \
              --file - \
              --wait
          algolia indices move "${INDEX_NAME}-tmp" "${INDEX_NAME}" -y -w
        env:
          ALGOLIA_APPLICATION_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_API_KEY: ${{ secrets.INDEXING_API_KEY }}
          INDEX_NAME: ${{ vars.INDEX_NAME }}

      - name: Update index settings
        run: |
          algolia settings import "${INDEX_NAME}" \
            --application-id "${ALGOLIA_APPLICATION_ID}" \
            --api-key "${ALGOLIA_API_KEY}" \
            --file .github/crawler/settings.json
        env:
          ALGOLIA_APPLICATION_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_API_KEY: ${{ secrets.INDEXING_API_KEY }}
          INDEX_NAME: ${{ vars.INDEX_NAME }}


name: Index the docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/crawler/**"
      - ".github/workflows/mini-crawler.yml"
      - "docs/**"

jobs:
  index-temp:
    name: Index docs into temporary Algolia index
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Install mini-crawler
        env:
          MINI_CRAWLER_VERSION: 0.2.0
        run: |
          set -euo pipefail
          archive="mini-crawler_${MINI_CRAWLER_VERSION}_linux_amd64.tar.gz"
          base_url="https://github.com/kai687/mini-crawler/releases/download/v${MINI_CRAWLER_VERSION}"
          curl -fsSLO "${base_url}/${archive}"
          curl -fsSLO "${base_url}/checksums.txt"
          grep " ${archive}$" checksums.txt | sha256sum -c -
          sudo tar -xzf "${archive}" -C /usr/local/bin mini-crawler

      - name: Install Algolia CLI
        env:
          ALGOLIA_CLI_VERSION: 1.8.2
        run: |
          set -euo pipefail
          archive="algolia_${ALGOLIA_CLI_VERSION}_linux_amd64.tar.gz"
          dirname="algolia_${ALGOLIA_CLI_VERSION}_linux_amd64"
          base_url="https://github.com/algolia/cli/releases/download/v${ALGOLIA_CLI_VERSION}"
          curl -fsSLO "${base_url}/${archive}"
          curl -fsSLO "${base_url}/algolia_${ALGOLIA_CLI_VERSION}_checksums.txt"
          grep " ${archive}$" "algolia_${ALGOLIA_CLI_VERSION}_checksums.txt" | sha256sum -c -
          sudo tar -xzf "${archive}" -C /usr/local/bin --strip-components=1 "${dirname}/algolia"

      - name: Check extraction script
        run: mini-crawler script check --script .github/crawler/sphinxawesome.star

      - name: Crawl and upload records to temporary Algolia index
        run: |
          mini-crawler crawl sitemap https://sphinxawesome.xyz/sitemap.xml \
            --script .github/crawler/sphinxawesome.star \
            --workers 2 \
            | algolia objects import "${INDEX_NAME}" \
              --application-id "${ALGOLIA_APPLICATION_ID}" \
              --api-key "${ALGOLIA_API_KEY}" \
              --file -
        env:
          ALGOLIA_APPLICATION_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_API_KEY: ${{ secrets.INDEXING_API_KEY }}
          INDEX_NAME: ${{ vars.TMP_INDEX_NAME }}
